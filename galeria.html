        .gallery-grid {

        }
        .gallery-item {
            background: #e2e8f0;
            border-radius: 6px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
            /* Ak budeš mať reálne obrázky, použiješ: background-image: url('foto.jpg'); */
        }
    </style>
</head>

            <h2>Ukážky našej práce</h2>
            <p>Pozrite si vizuálne zachytenie našich doterajších úspechov a projektov.</p>
            
            <div class="gallery-grid">
                <div class="gallery-item">Projekt A</div>
                <div class="gallery-item">Projekt B</div>
